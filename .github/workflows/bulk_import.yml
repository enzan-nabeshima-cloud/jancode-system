name: JANコード一括取得

# 手動実行(パラメータ指定可) と 定期実行(cron) の両方に対応
on:
  workflow_dispatch:
    inputs:
      base:  { description: "GS1事業者コード(先頭桁)", required: true,  default: "4901085" }
      start: { description: "開始アイテム番号",        required: false, default: "0" }
      end:   { description: "終了(この値は含まない)",  required: false, default: "100000" }
      limit: { description: "この回の最大件数",        required: false, default: "2000" }
      delay: { description: "1件あたり待機秒",         required: false, default: "1.5" }
  schedule:
    - cron: "0 18 * * *"   # 毎日 UTC18:00 (= 日本時間 翌3:00)。変更可

permissions:
  contents: write          # 取得後の jan_db.sqlite3 をコミットするため

concurrency:
  group: bulk-import       # 同時に複数回走らないようにする
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: 一括取得
        env:
          # --- 認証情報(Settings > Secrets に登録) ---
          RAKUTEN_APP_ID:     ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          YAHOO_APP_ID:       ${{ secrets.YAHOO_APP_ID }}
          APP_PUBLIC_URL:     ${{ secrets.APP_PUBLIC_URL }}
          OFF_CONTACT:        ${{ secrets.OFF_CONTACT }}
          # --- スキャン対象(手動入力 > リポジトリ Variables の順で採用) ---
          BASE:  ${{ github.event.inputs.base  || vars.BASE }}
          START: ${{ github.event.inputs.start || vars.START || '0' }}
          END:   ${{ github.event.inputs.end   || vars.END   || '100000' }}
          LIMIT: ${{ github.event.inputs.limit || vars.LIMIT || '2000' }}
          DELAY: ${{ github.event.inputs.delay || vars.DELAY || '1.5' }}
        run: |
          if [ -z "$BASE" ]; then echo "BASE 未設定。Variables か手動入力で指定してください"; exit 1; fi
          echo "base=$BASE start=$START end=$END limit=$LIMIT delay=$DELAY"
          python bulk_import.py --base "$BASE" --start "$START" --end "$END" --limit "$LIMIT" --delay "$DELAY"

      - name: 取得結果(DB)をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f jan_db.sqlite3
          git commit -m "data: 一括取得 $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "変更なし"
          git push
