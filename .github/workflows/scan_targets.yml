name: メーカー一覧から一括取得

on:
  workflow_dispatch:
    inputs:
      limit: { description: "この回の最大取得件数", required: false, default: "2000" }
      delay: { description: "1件あたり待機秒",      required: false, default: "1.5" }
  schedule:
    - cron: "0 18 * * *"   # 毎日 UTC18:00 (= 日本時間 翌3:00)

permissions:
  contents: write

concurrency:
  group: jan-db-write      # DBへ書く処理は同時に走らせない(他ワークフローと共通)
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 依存インストール
        run: pip install -r requirements.txt
      - name: メーカー一覧から取得
        env:
          RAKUTEN_APP_ID:     ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          YAHOO_APP_ID:       ${{ secrets.YAHOO_APP_ID }}
          APP_PUBLIC_URL:     ${{ secrets.APP_PUBLIC_URL }}
          OFF_CONTACT:        ${{ secrets.OFF_CONTACT }}
          LIMIT: ${{ github.event.inputs.limit || vars.LIMIT || '2000' }}
          DELAY: ${{ github.event.inputs.delay || vars.DELAY || '1.5' }}
        run: python scan_targets.py --limit "$LIMIT" --delay "$DELAY"
      - name: 取得結果(DB)をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f jan_db.sqlite3 targets.csv
          git commit -m "data: メーカー一覧取得 $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "変更なし"
          git push
